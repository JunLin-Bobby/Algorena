# Algorena 題庫 — Git 為唯一來源，startup seed 會 upsert 進 SQLite
#
# 欄位說明（對齊 QuestionPayload）：
#   id          必填，整數，全檔唯一；seed 用 id 判斷新增或更新
#   title       必填，題目標題
#   difficulty  必填，easy | medium | hard
#   description 必填，題目描述（可多行，用 |）
#   examples    必填，至少一筆；每筆含 input、output；explanation 可省略或 null
#   constraints 必填，字串陣列
#   starter_code 必填，語言代碼 → 初始程式碼（python、js 等）

